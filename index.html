<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 30 لغز - تحدي العقول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none !important;
            -webkit-user-select: none !important;
        }

        body {
            background: #0a0a0c;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* خلفية متحركة خفيفة */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(0deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* الهيدر الأنيق */
        .header {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #00ffff;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5em;
            font-weight: 600;
            background: linear-gradient(135deg, #00ffff, #80ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #888;
            font-size: 1.1em;
            border-right: 3px solid #00ffff;
            padding-right: 15px;
        }

        /* شريط التقدم المتحرك */
        .progress-container {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid #00ffff;
            border-radius: 50px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .progress-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2em;
        }

        .progress-info i {
            color: #00ffff;
            font-size: 1.5em;
        }

        .progress-bar {
            flex: 1;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            min-width: 200px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #0080ff);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* بطاقات المعلومات */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            border-color: #00ffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #00ffff;
            margin: 10px 0;
        }

        .stat-label {
            color: #888;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* شبكة الألغاز */
        .riddles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* بطاقة اللغز */
        .riddle-card {
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .riddle-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .riddle-card:hover {
            border-color: #00ffff;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 255, 255, 0.15);
        }

        .riddle-card:hover::before {
            transform: translateX(100%);
        }

        .riddle-card.completed {
            border-color: #00ff9d;
            background: rgba(0, 255, 157, 0.02);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .riddle-number {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
        }

        .riddle-status {
            font-size: 1.5em;
            color: #00ffff;
        }

        .riddle-status.completed {
            color: #00ff9d;
        }

        .riddle-question {
            font-size: 1.3em;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border-right: 3px solid #00ffff;
            line-height: 1.8;
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .riddle-input {
            flex: 1;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 1.1em;
            transition: all 0.3s;
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        .riddle-input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .riddle-input:disabled {
            opacity: 0.5;
            border-color: #00ff9d;
        }

        .btn-submit {
            padding: 15px 30px;
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .btn-submit:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #00ff9d;
        }

        .btn-hint {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            color: #00ffff;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-hint:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: #00ffff;
        }

        /* نوافذ منبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0a0a0c;
            border: 2px solid #00ffff;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            animation: modalSlide 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 2em;
            cursor: pointer;
            transition: 0.3s;
        }

        .close:hover {
            transform: rotate(90deg);
        }

        /* نافذة التسجيل */
        .register-modal {
            display: flex;
        }

        .register-content h2 {
            color: #00ffff;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .input-field {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ffff;
            border-radius: 15px;
            color: #fff;
            font-size: 1.1em;
            margin: 15px 0;
            user-select: text !important;
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            border-radius: 15px;
            color: #000;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            transition: 0.3s;
            margin: 20px 0;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.5);
        }

        /* نافذة الفائز */
        .winner-modal .modal-content {
            background: linear-gradient(135deg, #0a0a0c, #001a1a);
        }

        .winner-crown {
            font-size: 5em;
            animation: bounce 1s infinite;
            margin: 20px 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* لوحة المتصدرين */
        .leaderboard-list {
            margin-top: 20px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            font-size: 1.1em;
        }

        .leaderboard-item:first-child {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.3em;
        }

        /* تلميحات صغيرة */
        .floating-hint {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 60px;
            padding: 15px 25px;
            color: #00ffff;
            font-weight: bold;
            backdrop-filter: blur(10px);
            z-index: 999;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 255, 255, 0.6); }
        }

        /* حقوق الملكية */
        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid rgba(0, 255, 255, 0.1);
            margin-top: 50px;
        }

        .footer span {
            color: #00ffff;
        }

        /* تحسينات للأجهزة المحمولة */
        @media (max-width: 768px) {
            .container { padding: 15px; }
            h1 { font-size: 1.8em; }
            .riddles-grid { grid-template-columns: 1fr; }
            .progress-container { flex-direction: column; }
            .input-group { flex-direction: column; }
            .btn-submit { width: 100%; }
        }

        /* منع النسخ */
        .anti-copy {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 999999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="anti-copy"></div>
    <div class="cyber-bg"></div>

    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>🧩 30 لغز • تحدي العقول</h1>
            <div class="subtitle">إسلام شرطة الأنبو • النسخة السيبرانية</div>
        </div>

        <!-- شريط التقدم -->
        <div class="progress-container">
            <div class="progress-info">
                <i class="fas fa-brain"></i>
                <span id="completed-count">0</span>/<span id="total-count">30</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-info">
                <i class="fas fa-clock"></i>
                <span id="timer">00:00:00</span>
            </div>
        </div>

        <!-- إحصائيات سريعة -->
        <div class="stats-panel">
            <div class="stat-card">
                <i class="fas fa-trophy" style="color: #00ffff;"></i>
                <div class="stat-value" id="solved-counter">0</div>
                <div class="stat-label">تم الحل</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-hourglass-half" style="color: #00ffff;"></i>
                <div class="stat-value" id="remaining-counter">30</div>
                <div class="stat-label">المتبقي</div>
            </div>
            <div class="stat-card" onclick="toggleLeaderboard()" style="cursor: pointer;">
                <i class="fas fa-crown" style="color: #00ffff;"></i>
                <div class="stat-value">🏆</div>
                <div class="stat-label">المتصدرون</div>
            </div>
        </div>

        <!-- شبكة الألغاز -->
        <div class="riddles-grid" id="riddles-grid"></div>

        <!-- نافذة المتصدرين -->
        <div id="leaderboard-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="toggleLeaderboard()">&times;</span>
                <h2 style="color: #00ffff; margin-bottom: 30px;">🏆 قادة التحدي</h2>
                <div class="leaderboard-list" id="leaderboard-list"></div>
            </div>
        </div>

        <!-- نافذة الفائز -->
        <div id="winner-modal" class="modal winner-modal">
            <div class="modal-content">
                <div class="winner-crown">👑</div>
                <h2 style="color: #00ffff; margin: 20px 0;">فائز جديد!</h2>
                <h3 id="winner-name" style="font-size: 2em; margin: 20px 0;"></h3>
                <p style="color: #888;">أكمل 30 لغز بنجاح</p>
                <button class="btn-primary" onclick="closeWinnerModal()" style="margin-top: 30px;">إغلاق</button>
            </div>
        </div>

        <!-- نافذة التسجيل -->
        <div id="register-modal" class="modal register-modal">
            <div class="modal-content">
                <h2>🔐 دخول سريع</h2>
                <form id="register-form" onsubmit="registerUser(event)">
                    <input type="text" class="input-field" id="username" placeholder="اسم المستخدم" required minlength="3" maxlength="20">
                    <input type="email" class="input-field" id="email" placeholder="البريد الإلكتروني (اختياري)">
                    <button type="submit" class="btn-primary">ابدأ التحدي</button>
                </form>
            </div>
        </div>

        <!-- تلميح عائم -->
        <div class="floating-hint">
            <i class="fas fa-lightbulb"></i> جاوب على 30 لغز وكن الأول!
        </div>

        <!-- حقوق الملكية -->
        <div class="footer">
            <span>© 2026 إسلام شرطة الأنبو</span> • جميع الحقوق محفوظة • التحدي السيبراني
        </div>
    </div>

    <script>
        // منع النسخ المتقدم
        (function() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    return false;
                }
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                    e.preventDefault();
                    return false;
                }
            });
            
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('copy', (e) => e.preventDefault());
            document.addEventListener('cut', (e) => e.preventDefault());
            document.addEventListener('paste', (e) => e.preventDefault());
            document.addEventListener('selectstart', (e) => e.preventDefault());
        })();

        // بيانات المستخدم
        let currentUser = null;
        let completed = 0;
        let startTime = Date.now();
        let timerInterval;
        let riddles = [];

        // 30 لغز عربي متنوع
        const riddlesList = [
            // ألغاز صعبة - متنوعة
            { q: 'ما هو الشيء الذي كلما أخذت منه كبر؟', a: 'الحفرة', h: 'فيه تحفر' },
            { q: 'ما الذي يكتب ولا يقرأ؟', a: 'القلم', h: 'يكتب به' },
            { q: 'ما هو الشيء الذي يمشي ويقف بلا أرجل؟', a: 'الساعة', h: 'تقيس الوقت' },
            { q: 'ما هو الشيء الذي كلما زاد نقص؟', a: 'العمر', h: 'يمر بسرعة' },
            { q: 'ما هو البيت الذي ليس له أبواب ولا نوافذ؟', a: 'بيت الشعر', h: 'يقال في القصائد' },
            { q: 'ما هو الشيء الذي تراه ولا تستطيع لمسه؟', a: 'السماء', h: 'فوق رأسك' },
            { q: 'ما هو الشيء الذي له أسنان ولا يعض؟', a: 'المشط', h: 'للشعر' },
            { q: 'ما هو الشيء الذي يطير في النهار ويمشي في الليل؟', a: 'الظل', h: 'يظهر مع الشمس' },
            { q: 'ما هو الشيء الذي يسمع بلا أذن ويتكلم بلا لسان؟', a: 'التلفون', h: 'جهاز اتصال' },
            { q: 'ما هو الشيء الذي كلما مشى خطوة فقد شيئاً من جسمه؟', a: 'الساعة', h: 'عقاربها تتحرك' },
            { q: 'ما هو الشيء الذي له وجه وليس له لسان ويدل الناس على الزمان؟', a: 'الساعة', h: 'لها عقارب' },
            { q: 'ما هو الشيء الذي له عين ولا يرى؟', a: 'الإبرة', h: 'تستخدم للخياطة' },
            { q: 'ما هو الشيء الذي إذا دخل الماء مات؟', a: 'الثلج', h: 'يذوب' },
            { q: 'ما هو الشيء الذي لا يمشي إلا بالضرب؟', a: 'المسمار', h: 'يدق بالمطرقة' },
            { q: 'ما هو الشيء الذي اسمه على لونه؟', a: 'البرتقال', h: 'فاكهة' },
            { q: 'ما هو الشيء الذي له أوراق وليس بشجر؟', a: 'الكتاب', h: 'يقرأ' },
            { q: 'ما هو الشيء الذي له جلد وليس بحيوان؟', a: 'الكتاب', h: 'غلافه جلد' },
            { q: 'ما هو الشيء الذي له رأس ولا عينين؟', a: 'الدبوس', h: 'يستخدم للخياطة' },
            { q: 'ما هو الشيء الذي يبكي بلا عيون؟', a: 'الغيم', h: 'يمطر' },
            { q: 'ما هو الشيء الذي يحملك وتحمله في نفس الوقت؟', a: 'الحذاء', h: 'تلبسه في قدمك' },
            { q: 'ما هو الشيء الذي إذا لمسته صرخ؟', a: 'الجرس', h: 'يدق' },
            { q: 'ما هو الشيء الذي له أذن ولا يسمع؟', a: 'الإبريق', h: 'له عروة' },
            { q: 'ما هو الشيء الذي له فم ولا يأكل؟', a: 'النهر', h: 'مصب النهر' },
            { q: 'ما هو الشيء الذي له عين ولا يبصر؟', a: 'المقص', h: 'ثقب المقص' },
            { q: 'ما هو الشيء الذي له يد ولا يعطي؟', a: 'الساعة', h: 'عقارب الساعة' },
            { q: 'ما هو الشيء الذي له رقبة ولا رأس؟', a: 'الزجاجة', h: 'عنق الزجاجة' },
            { q: 'ما هو الشيء الذي له أسنان ولا يأكل؟', a: 'المشط', h: 'أسنان المشط' },
            { q: 'ما هو الشيء الذي له عين واحدة ولا يرى؟', a: 'الإبرة', h: 'عين الإبرة' },
            { q: 'ما هو الشيء الذي له أربع أرجل ولا يمشي؟', a: 'الكرسي', h: 'يقعدون عليه' },
            { q: 'ما هو الشيء الذي إذا شرب مات وإذا أكل عاش؟', a: 'النار', h: 'تطفأ بالماء' }
        ];

        // تسجيل الدخول
        function registerUser(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            if (username) {
                currentUser = { 
                    name: username, 
                    startTime: Date.now(),
                    solved: 0
                };
                document.getElementById('register-modal').style.display = 'none';
                initRiddles();
                startTimer();
            }
        }

        // بدء المؤقت
        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const hours = Math.floor(elapsed / 3600);
                const minutes = Math.floor((elapsed % 3600) / 60);
                const seconds = elapsed % 60;
                document.getElementById('timer').innerHTML = 
                    `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            }, 1000);
        }

        // تهيئة الألغاز
        function initRiddles() {
            riddles = riddlesList.map((r, index) => ({
                id: index,
                question: r.q,
                answer: r.a,
                hint: r.h,
                solved: false
            }));
            loadRiddles();
        }

        // تحميل الألغاز
        function loadRiddles() {
            const grid = document.getElementById('riddles-grid');
            grid.innerHTML = '';
            
            riddles.forEach((riddle, index) => {
                const card = document.createElement('div');
                card.className = `riddle-card ${riddle.solved ? 'completed' : ''}`;
                card.innerHTML = `
                    <div class="card-header">
                        <span class="riddle-number">#${(index + 1).toString().padStart(2, '0')}</span>
                        <span class="riddle-status ${riddle.solved ? 'completed' : ''}">
                            <i class="fas ${riddle.solved ? 'fa-check-circle' : 'fa-question-circle'}"></i>
                        </span>
                    </div>
                    <div class="riddle-question">${riddle.question}</div>
                    <div class="input-group">
                        <input type="text" class="riddle-input" id="riddle-${index}" 
                               placeholder="اكتب إجابتك..." 
                               ${riddle.solved ? 'disabled' : ''}>
                        <button class="btn-submit" onclick="checkRiddle(${index})" 
                                ${riddle.solved ? 'disabled' : ''}>
                            ${riddle.solved ? '✓ تم' : 'إجابة'}
                        </button>
                    </div>
                    <button class="btn-hint" onclick="showHint(${index})">
                        <i class="fas fa-lightbulb"></i> تلميح
                    </button>
                `;
                grid.appendChild(card);
            });
            
            updateStats();
        }

        // التحقق من الإجابة
        function checkRiddle(index) {
            const input = document.getElementById(`riddle-${index}`);
            const answer = input.value.trim();
            
            if (answer === riddles[index].answer) {
                riddles[index].solved = true;
                completed++;
                updateProgress();
                loadRiddles();
                
                if (completed === 30) {
                    declareWinner();
                }
                
                // تأثير احتفالي
                celebrate(index);
            } else {
                alert('❌ إجابة خاطئة! حاول مرة أخرى');
            }
        }

        // إظهار التلميح
        function showHint(index) {
            alert(`💡 تلميح: ${riddles[index].hint}`);
        }

        // تحديث التقدم
        function updateProgress() {
            const percent = (completed / 30) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('completed-count').innerHTML = completed;
            document.getElementById('solved-counter').innerHTML = completed;
            document.getElementById('remaining-counter').innerHTML = 30 - completed;
            
            if (currentUser) {
                currentUser.solved = completed;
            }
        }

        // تحديث الإحصائيات
        function updateStats() {
            document.getElementById('completed-count').innerHTML = completed;
            document.getElementById('solved-counter').innerHTML = completed;
            document.getElementById('remaining-counter').innerHTML = 30 - completed;
            document.getElementById('total-count').innerHTML = '30';
        }

        // تأثير احتفالي
        function celebrate(index) {
            const card = event.target.closest('.riddle-card');
            if (card) {
                card.style.transform = 'scale(1.02)';
                setTimeout(() => {
                    card.style.transform = '';
                }, 200);
            }
        }

        // إعلان الفائز
        function declareWinner() {
            clearInterval(timerInterval);
            document.getElementById('winner-name').innerHTML = currentUser.name;
            document.getElementById('winner-modal').style.display = 'flex';
            saveWinner();
        }

        // حفظ الفائز
        function saveWinner() {
            const winners = JSON.parse(localStorage.getItem('riddle_winners') || '[]');
            winners.push({
                name: currentUser.name,
                time: Math.floor((Date.now() - startTime) / 1000),
                date: new Date().toISOString(),
                solved: 30
            });
            localStorage.setItem('riddle_winners', JSON.stringify(winners));
        }

        // تبديل المتصدرين
        function toggleLeaderboard() {
            const modal = document.getElementById('leaderboard-modal');
            const list = document.getElementById('leaderboard-list');
            const winners = JSON.parse(localStorage.getItem('riddle_winners') || '[]');
            
            if (winners.length === 0) {
                list.innerHTML = '<div style="color: #666; padding: 20px;">لا يوجد فائزين بعد</div>';
            } else {
                list.innerHTML = winners
                    .sort((a, b) => a.time - b.time)
                    .slice(0, 10)
                    .map((w, i) => `
                        <div class="leaderboard-item">
                            <span>${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '📌'} ${w.name}</span>
                            <span>${Math.floor(w.time / 60)}:${(w.time % 60).toString().padStart(2, '0')}</span>
                        </div>
                    `).join('');
            }
            
            modal.style.display = 'flex';
        }

        // إغلاق نافذة الفائز
        function closeWinnerModal() {
            document.getElementById('winner-modal').style.display = 'none';
        }

        // إغلاق النوافذ عند النقر خارجها
        window.onclick = function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }

        // تهيئة الصفحة
        window.onload = function() {
            document.getElementById('winner-modal').style.display = 'none';
            document.getElementById('leaderboard-modal').style.display = 'none';
        };
    </script>
</body>
</html>
