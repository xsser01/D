<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CYBER CHALLENGE - 40 ENCRYPTIONS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none !important;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
        }

        /* CYBERPUNK DARK THEME - NO COLORS JUST CYAN & BLACK */
        body {
            background: #030303;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            min-height: 100vh;
            position: relative;
            line-height: 1.4;
        }

        /* Matrix Background Effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 157, 0.03) 0px, rgba(0, 0, 0, 1) 2px, transparent 3px);
            pointer-events: none;
            z-index: 0;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(100%); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 10px;
        }

        /* HEADER - MINIMAL CYBER */
        .header {
            border: 1px solid #00ff9d;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 255, 157, 0.02);
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: 'SYSTEM.v1 // ISLAM SHURTA AL-ANBO';
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 10px;
            color: #00ff9d;
            opacity: 0.3;
        }

        h1 {
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00ff9d;
            text-shadow: 0 0 5px #00ff9d;
        }

        .subtitle {
            font-size: 11px;
            color: #00ff9d;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* PROGRESS - TERMINAL STYLE */
        .progress-section {
            border: 1px solid #00ff9d;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(0, 255, 157, 0.02);
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }

        .progress-bar {
            height: 15px;
            border: 1px solid #00ff9d;
            background: transparent;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #00ff9d;
            width: 0%;
            transition: width 0.2s;
            box-shadow: 0 0 5px #00ff9d;
        }

        /* INFO PANEL */
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #00ff9d;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-size: 14px;
            background: rgba(0, 255, 157, 0.02);
        }

        .timer {
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .leaderboard-btn {
            border: 1px solid #00ff9d;
            padding: 5px 15px;
            cursor: pointer;
            background: transparent;
            color: #00ff9d;
            font-size: 12px;
            transition: 0.2s;
            font-family: 'Courier New', monospace;
        }

        .leaderboard-btn:hover {
            background: #00ff9d;
            color: #000;
        }

        /* GRIDS - COMPACT */
        .challenges-grid, .riddles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        /* CHALLENGE CARD - NO COLORS, ONLY CYAN */
        .challenge-card, .riddle-card {
            border: 1px solid #00ff9d;
            background: rgba(0, 255, 157, 0.02);
            padding: 12px;
            transition: 0.2s;
            position: relative;
        }

        .challenge-card:hover, .riddle-card:hover {
            background: rgba(0, 255, 157, 0.05);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            padding-bottom: 5px;
        }

        .card-number {
            font-size: 12px;
            color: #00ff9d;
            opacity: 0.8;
        }

        .card-status {
            font-size: 14px;
        }

        .card-status.completed {
            color: #00ff9d;
        }

        .card-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* CHALLENGE TEXT - SMALL */
        .challenge-text {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ff9d;
            padding: 8px;
            margin: 8px 0;
            direction: ltr;
            text-align: left;
            word-break: break-all;
            color: #00ff9d;
            line-height: 1.3;
            max-height: 80px;
            overflow-y: auto;
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        /* RIDDLE QUESTION - SMALL */
        .riddle-question {
            font-size: 12px;
            margin: 10px 0;
            min-height: 50px;
            border: 1px solid rgba(0, 255, 157, 0.3);
            padding: 8px;
            background: rgba(0, 0, 0, 0.5);
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        /* INPUT FIELDS - MINIMAL */
        .challenge-input, .riddle-input {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            margin: 5px 0;
            outline: none;
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        .challenge-input:focus, .riddle-input:focus {
            background: rgba(0, 255, 157, 0.05);
            box-shadow: 0 0 5px #00ff9d;
        }

        /* BUTTONS - TERMINAL STYLE */
        .challenge-btn, .riddle-btn, .hint-btn {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: 0.15s;
            margin: 3px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .challenge-btn:hover, .riddle-btn:hover, .hint-btn:hover {
            background: #00ff9d;
            color: #000;
        }

        .challenge-btn:disabled, .riddle-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .challenge-btn:disabled:hover {
            background: transparent;
            color: #00ff9d;
        }

        /* MODALS - CYBER */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            border: 1px solid #00ff9d;
        }

        .modal-content {
            background: #030303;
            border: 2px solid #00ff9d;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.3);
        }

        .close {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00ff9d;
            font-size: 20px;
            cursor: pointer;
        }

        /* REGISTER MODAL */
        .register-modal {
            display: flex;
        }

        .input-group {
            margin: 15px 0;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-primary:hover {
            background: #00ff9d;
            color: #000;
        }

        /* WINNER MODAL */
        .winner-content {
            text-align: center;
            border-color: #00ff9d;
        }

        .winner-crown {
            font-size: 40px;
            margin: 20px 0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* LEADERBOARD */
        #leaderboard-list div {
            padding: 8px;
            margin: 5px 0;
            border: 1px solid rgba(0, 255, 157, 0.3);
            font-size: 12px;
        }

        /* ANTI-CHEAT NOTICE */
        .anti-cheat-notice {
            position: fixed;
            bottom: 5px;
            left: 5px;
            font-size: 9px;
            color: #00ff9d;
            opacity: 0.5;
            z-index: 9999;
            letter-spacing: 0.5px;
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 10px;
            border-top: 1px solid rgba(0, 255, 157, 0.3);
            margin-top: 20px;
            color: #00ff9d;
            opacity: 0.7;
        }

        /* SCROLLBAR - CYBER */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff9d;
        }

        /* UTILS */
        .hidden {
            display: none;
        }

        /* TEXT SELECTION OVERRIDE FOR CHALLENGE TEXTS */
        .challenge-text::-moz-selection, .riddle-question::-moz-selection {
            background: #00ff9d;
            color: #000;
        }

        .challenge-text::selection, .riddle-question::selection {
            background: #00ff9d;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>⚡ CYBER CHALLENGE ⚡</h1>
            <div class="subtitle">ISLAM SHURTA AL-ANBO // 40 ENCRYPTIONS</div>
        </div>

        <!-- PROGRESS -->
        <div class="progress-section">
            <div class="progress-stats">
                <span>[<span id="completed-count">0</span>/40]</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <!-- INFO -->
        <div class="info-panel">
            <div class="timer"><i class="far fa-clock"></i> <span id="timer">00:00:00</span></div>

        </div>

        <!-- CHALLENGES GRID -->
        <div id="challenges-section">
            <div class="challenges-grid" id="challenges-grid"></div>
        </div>

        <!-- RIDDLES SECTION (HIDDEN) -->
        <div id="riddles-section" style="display: none;">
            <div style="border:1px solid #00ff9d; padding:8px; margin:15px 0; text-align:center; font-size:12px;">
                ⚡ FINAL RIDDLES ⚡
            </div>
            <div class="riddles-grid" id="riddles-grid"></div>
        </div>

        <!-- MODALS -->
        <div id="leaderboard-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="toggleLeaderboard()">✕</span>
                <h3 style="margin-bottom:20px; font-size:16px;">🏆 LEADERBOARD</h3>
                <div id="leaderboard-list"></div>
            </div>

        <div id="winner-modal" class="modal winner-modal">

                <h3 id="winner-name" style="margin:15px 0; font-size:22px;"></h3>
                <div class="winner-crown">⚡</div>
                <button onclick="closeWinnerModal()" class="btn-primary" style="margin-top:15px;">CLOSE</button>
            </div>
        </div>

        <div id="register-modal" class="modal register-modal">
            <div class="modal-content">
                <h3 style="margin-bottom:20px; font-size:16px;">🔐 ACCESS TERMINAL</h3>
                <form id="register-form" onsubmit="registerUser(event)">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="USERNAME" required minlength="3" maxlength="20">
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" placeholder="EMAIL (OPTIONAL)">
                    </div>
                    <button type="submit" class="btn-primary">INITIALIZE</button>
                </form>
            </div>
        </div>

        <!-- FOOTER & PROTECTION -->
        <div class="anti-cheat-notice">© ISLAM SHURTA AL-ANBO // CYBER DIVISION 2026</div>
        <div class="footer">[ SYSTEM: ONLINE ] // [ ENCRYPTIONS: 40 ] // [ STATUS: ACTIVE ]</div>
    </div>

    <canvas id="confetti" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>

    <script>
        // ANTI-COPY - MAXIMUM
        (function() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    return false;
                }
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                    e.preventDefault();
                    return false;
                }
            });
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('dragstart', (e) => e.preventDefault());
            document.addEventListener('copy', (e) => {
                e.preventDefault();
                e.clipboardData.setData('text/plain', '');
            });
            document.addEventListener('cut', (e) => e.preventDefault());
            document.addEventListener('paste', (e) => e.preventDefault());
            document.addEventListener('selectstart', (e) => e.preventDefault());
        })();

        // VARIABLES
        let currentUser = null;
        let completed = 0;
        let startTime = Date.now();
        let timerInterval;
        let challenges = [];
        let riddles = [];

        const challengeTypes = [
    { type: 'base64', name: 'BASE64', text: 'U3BhcnRhbmlh', answer: 'Spartania' },
    { type: 'binary', name: 'BINARY', text: '01001011 01101001 01101110 01100111', answer: 'King' },
    { type: 'hex', name: 'HEXADECIMAL', text: '46 6f 78', answer: 'Fox' },
    { type: 'rot13', name: 'ROT13', text: 'Gur Tbq', answer: 'The Dog' },
    { type: 'morse', name: 'MORSE', text: '--. .-. .- -. -..', answer: 'GRAND' },
    { type: 'atbash', name: 'ATBASH', text: 'Zgyzhs', answer: 'Attack' },
    { type: 'ascii', name: 'ASCII', text: '77 79 78 4b 65 79', answer: 'MonKey' },
    { type: 'base32', name: 'BASE32', text: 'NBSWY3DP', answer: 'HELLO' },
    { type: 'rot5', name: 'ROT5', text: '67890', answer: '12345' },
    { type: 'reverse', name: 'REVERSE', text: '!drowkcaB', answer: 'Backword!' },
    { type: 'rot47', name: 'ROT47', text: '6EC==', answer: 'Test' },
    { type: 'bacon', name: 'BACON', text: 'AABAA ABABB ABAAA', answer: 'Cat' },
    { type: 'railfence', name: 'RAILFENCE', text: 'Hloel Wrd', answer: 'Hello Word' },
    { type: 'caesar3', name: 'CAESAR+3', text: 'Plwwd', answer: 'Smile' },
    { type: 'caesar5', name: 'CAESAR+5', text: 'Wtaad', answer: 'Apple' },
    { type: 'caesar10', name: 'CAESAR+10', text: 'Rovvy', answer: 'Hello' },
    { type: 'affine', name: 'AFFINE', text: 'Wtaad', answer: 'Apple' },
    { type: 'xor', name: 'XOR', text: '1719131914', answer: 'Secret' },
    { type: 'rot18', name: 'ROT18', text: 'Uryyb123', answer: 'Hello123' },
    { type: 'leet', name: 'LEET', text: 'p@55w0rd', answer: 'password' }
];
        // 20 RIDDLES
        const arabicRiddles = [
            { q: 'ما هو الشيء الذي كلما أخذت منه كبر؟', a: 'الحفرة' },
            { q: 'ما الذي يكتب ولا يقرأ؟', a: 'القلم' },
            { q: 'ما هو الشيء الذي يمشي ويقف بلا أرجل؟', a: 'الساعة' },
            { q: 'ما هو الشيء الذي كلما زاد نقص؟', a: 'العمر' },
            { q: 'ما هو البيت الذي ليس له أبواب ولا نوافذ؟', a: 'بيت الشعر' },
            { q: 'ما هو الشيء الذي تراه ولا تستطيع لمسه؟', a: 'السماء' },
            { q: 'ما هو الشيء الذي له أسنان ولا يعض؟', a: 'المشط' },
            { q: 'ما هو الشيء الذي يطير بالنهار ويمشي بالليل؟', a: 'الظل' },
            { q: 'ما هو الشيء الذي يسمع بلا أذن ويتكلم بلا لسان؟', a: 'التلفون' },
            { q: 'ما هو الشيء الذي كلما مشى فقد شيئاً من جسمه؟', a: 'الساعة' },
            { q: 'ما له وجه وليس له لسان ويدل على الزمان؟', a: 'الساعة' },
            { q: 'ما هو الشيء الذي له عين ولا يرى؟', a: 'الإبرة' },
            { q: 'ما هو الشيء الذي إذا دخل الماء مات؟', a: 'الثلج' },
            { q: 'ما هو الشيء الذي لا يمشي إلا بالضرب؟', a: 'المسمار' },
            { q: 'ما هو الشيء الذي اسمه على لونه؟', a: 'البرتقال' },
            { q: 'ما هو الشيء الذي له أوراق وليس بشجر؟', a: 'الكتاب' },
            { q: 'ما هو الشيء الذي له جلد وليس بحيوان؟', a: 'الكتاب' },
            { q: 'ما هو الشيء الذي له رأس ولا عينين؟', a: 'الدبوس' },
            { q: 'ما هو الشيء الذي يبكي بلا عيون؟', a: 'الغيم' },
            { q: 'ما هو الشيء الذي يحملك وتحمله؟', a: 'الحذاء' }
        ];

        // INIT CHALLENGES
        function initChallenges() {
            challenges = challengeTypes.map((ch, index) => ({
                ...ch,
                id: index,
                solved: false
            }));
        }

        // INIT RIDDLES
        function initRiddles() {
            riddles = arabicRiddles.map((r, index) => ({
                id: index,
                question: r.q,
                answer: r.a,
                solved: false
            }));
        }

        // REGISTER
        function registerUser(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            if (username) {
                currentUser = { name: username, startTime: Date.now() };
                document.getElementById('register-modal').style.display = 'none';
                initChallenges();
                initRiddles();
                loadChallenges();
                startTimer();
            }
        }

        // TIMER
        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(elapsed / 3600);
                const m = Math.floor((elapsed % 3600) / 60);
                const s = elapsed % 60;
                document.getElementById('timer').innerHTML = 
                    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        // LOAD CHALLENGES
        function loadChallenges() {
            const grid = document.getElementById('challenges-grid');
            grid.innerHTML = '';
            
            challenges.forEach((ch, i) => {
                grid.innerHTML += `
                    <div class="challenge-card">
                        <div class="card-header">
                            <span class="card-number">#${(i+1).toString().padStart(2,'0')}</span>
                            <span class="card-status ${ch.solved ? 'completed' : ''}">
                                ${ch.solved ? '✓' : '○'}
                            </span>
                        </div>
                        <div class="card-title">${ch.name}</div>
                        <div class="challenge-text">${ch.text}</div>
                        <input type="text" class="challenge-input" id="challenge-${i}" ${ch.solved ? 'disabled' : ''} placeholder=">_">
                        <button class="challenge-btn" onclick="checkChallenge(${i})" ${ch.solved ? 'disabled' : ''}>
                            ${ch.solved ? 'DONE' : 'DECRYPT'}
                        </button>
                        <button class="hint-btn" onclick="alert('HINT: ${ch.text.length} chars')">
                            [?]
                        </button>
                    </div>
                `;
            });
        }

        // LOAD RIDDLES
        function loadRiddles() {
            const grid = document.getElementById('riddles-grid');
            grid.innerHTML = '';
            
            riddles.forEach((r, i) => {
                grid.innerHTML += `
                    <div class="riddle-card">
                        <div class="card-header">
                            <span class="card-number">#${(i+21).toString().padStart(2,'0')}</span>
                            <span class="card-status ${r.solved ? 'completed' : ''}">
                                ${r.solved ? '✓' : '?'}
                            </span>
                        </div>
                        <div class="riddle-question">${r.question}</div>
                        <input type="text" class="riddle-input" id="riddle-${i}" ${r.solved ? 'disabled' : ''} placeholder="...">
                        <button class="riddle-btn" onclick="checkRiddle(${i})" ${r.solved ? 'disabled' : ''}>
                            ${r.solved ? 'DONE' : 'ANSWER'}
                        </button>
                    </div>
                `;
            });
        }

        // CHECK CHALLENGE
        function checkChallenge(index) {
            const input = document.getElementById(`challenge-${index}`);
            const answer = input.value.trim().toLowerCase();
            
            if (answer === challenges[index].answer) {
                challenges[index].solved = true;
                completed++;
                updateProgress();
                loadChallenges();
                
                if (completed === 20) {
                    document.getElementById('riddles-section').style.display = 'block';
                    loadRiddles();
                }
                
                if (completed === 40) declareWinner();
            } else {
                alert('ACCESS DENIED');
            }
        }

        // CHECK RIDDLE
        function checkRiddle(index) {
            const input = document.getElementById(`riddle-${index}`);
            const answer = input.value.trim();
            
            if (answer === riddles[index].answer) {
                riddles[index].solved = true;
                completed++;
                updateProgress();
                loadRiddles();
                
                if (completed === 40) declareWinner();
            } else {
                alert('WRONG');
            }
        }

        // UPDATE PROGRESS
        function updateProgress() {
            const percent = (completed / 40) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('completed-count').innerHTML = completed;
            document.getElementById('progress-percent').innerHTML = Math.round(percent) + '%';
        }

        // WINNER
        function declareWinner() {
            clearInterval(timerInterval);
            document.getElementById('winner-name').innerHTML = currentUser.name;
            document.getElementById('winner-modal').style.display = 'flex';
            saveWinner();
        }

        // SAVE WINNER
        function saveWinner() {
            let winners = JSON.parse(localStorage.getItem('winners') || '[]');
            winners.push({
                name: currentUser.name,
                time: Math.floor((Date.now() - startTime) / 1000)
            });
            localStorage.setItem('winners', JSON.stringify(winners));
        }

        // LEADERBOARD
        function toggleLeaderboard() {
            const modal = document.getElementById('leaderboard-modal');
            const list = document.getElementById('leaderboard-list');
            const winners = JSON.parse(localStorage.getItem('winners') || '[]');
            
            list.innerHTML = winners.length ? 
                winners.sort((a,b) => a.time - b.time).slice(0,10).map((w,i) => 
                    `<div>${i+1}. ${w.name} - ${Math.floor(w.time/60)}:${(w.time%60).toString().padStart(2,'0')}</div>`
                ).join('') : '<div style="opacity:0.5;">NO WINNERS</div>';
            
            modal.style.display = 'flex';
        }

        function closeWinnerModal() {
            document.getElementById('winner-modal').style.display = 'none';
        }

        // INIT
        window.onload = () => {
            document.getElementById('winner-modal').style.display = 'none';
        };
    </script>
</body>
</html>
